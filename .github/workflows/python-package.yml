name: 🐍 Python CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:  # Manual trigger! 🎮

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, 3.10, 3.11, '3.12-dev']  # Latest! 🔥

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history untuk coverage

    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5  # Latest version
      id: python
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'  # Cache dependencies 💨

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt -r requirements-dev.txt || pip install flake8 pytest pytest-cov ruff mypy black
        pip install -e .[dev]  # Editable install

    - name: 🎨 Auto-format with Black
      run: |
        black . --check --diff || echo "🖌️ Code needs formatting!"

    - name: 🔍 Modern Lint with Ruff (faster than flake8!)
      run: |
        ruff check . --output-format=github
        ruff format --check .

    - name: 📊 Type Checking with Mypy
      run: |
        mypy src/ tests/ --install-types --non-interactive

    - name: 🧪 Run Tests with Coverage
      run: |
        pytest tests/ \
          -v \
          --cov=src/ \
          --cov-report=xml \
          --cov-report=term-missing \
          --cov-fail-under=85  # Min 85% coverage! 📈

    - name: 📊 Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: 🏗️ Build Package
      run: |
        python -m build --sdist --wheel

    - name: 📦 Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.python-version }}
        path: dist/*

    - name: 🔐 Security Scan
      uses: pre-commit/action@v3.0.1
      with:
        extra_args: bandit -r src/

